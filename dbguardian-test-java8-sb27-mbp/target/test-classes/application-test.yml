    # 从库数据源配置
    slave:
      url: jdbc:mysql://192.168.3.151:3306/dbguardian_test?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      username: root
      password: zhuzhou9uu897@
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 5
        minimum-idle: 1
        connection-timeout: 10000
        idle-timeout: 300000
        max-lifetime: 600000
    # 主从复制配置
    replication:
      master-host: 192.168.3.150
      master-port: 3306
      master-user: repl
      master-password: zhuzhou9uu897@
      auto-reconnect: true
    # 允许降级启动
    allow-degraded-startup: true

  # Redis配置（测试环境）
  redis:
    host: 192.168.3.150
    port: 6379
    password: zhuzhou9uu897@
    database: 1
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: 1000ms
        max-idle: 2
        min-idle: 1

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.test.entity

# 日志配置
logging:
  level:
    root: INFO
    com.test: DEBUG
    io.dbguardian: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
